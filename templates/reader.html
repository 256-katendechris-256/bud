{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Be Better BookClub  | {{ book.title }}</title>
  <link rel="icon" type="image/png" href="{% static 'img/bebetter.png' %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf_viewer.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs" type="module"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Manrope", sans-serif;
      background: #1a1a2e;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .reader-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: #16213e;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      z-index: 10;
    }

    .reader-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .reader-back:hover { background: rgba(255,255,255,0.1); }

    .reader-title {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .reader-author {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Navigation controls */
    .reader-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .reader-controls button {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .reader-controls button:hover { background: rgba(255,255,255,0.1); }
    .reader-controls button:disabled { opacity: 0.3; cursor: default; }
    .reader-page-info {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      min-width: 70px;
      text-align: center;
    }

    /* Bookmark button — overrides the generic 32px square rule */
    .btn-bookmark {
      width: auto !important;
      height: 34px !important;
      padding: 0 14px !important;
      gap: 6px !important;
      background: #6c63ff !important;
      border-color: #6c63ff !important;
      border-radius: 8px !important;
      font-size: 0.78rem !important;
      font-weight: 700 !important;
      letter-spacing: 0.01em;
      white-space: nowrap;
      transition: background 0.2s, opacity 0.2s !important;
    }
    .btn-bookmark:hover { background: #5a52d5 !important; }
    .btn-bookmark:disabled { opacity: 0.45 !important; cursor: default; }

    /* Notes button — same pill style as bookmark */
    .btn-notes {
      width: auto !important;
      height: 34px !important;
      padding: 0 14px !important;
      gap: 6px !important;
      background: rgba(255,255,255,0.08) !important;
      border: 1px solid rgba(255,255,255,0.2) !important;
      border-radius: 8px !important;
      font-size: 0.78rem !important;
      font-weight: 700 !important;
      white-space: nowrap;
      transition: background 0.2s !important;
    }
    .btn-notes:hover { background: rgba(255,255,255,0.15) !important; }
    .btn-notes.is-open { background: rgba(255,255,255,0.18) !important; border-color: rgba(255,255,255,0.4) !important; }

    /* Notes panel */
    .notes-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #16213e;
      border-top: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px 20px 0 0;
      max-height: 62vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 150;
    }
    .notes-panel.is-open { transform: translateY(0); }

    .notes-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .notes-panel-header h3 {
      font-size: 0.95rem;
      font-weight: 700;
    }
    .notes-panel-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .notes-panel-close:hover { color: #fff; background: rgba(255,255,255,0.1); }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
    }
    .note-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .note-item:last-child { border-bottom: none; }
    .note-page {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 700;
      background: rgba(108,99,255,0.3);
      color: #a89cff;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
      margin-top: 1px;
    }
    .note-text {
      flex: 1;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .note-delete {
      background: none;
      border: none;
      color: rgba(255,255,255,0.25);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 2px 4px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .note-delete:hover { color: #f87171; }
    .notes-empty {
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
      padding: 24px 0;
    }

    .notes-compose {
      flex-shrink: 0;
      padding: 12px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .notes-compose-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .notes-textarea {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-family: "Manrope", sans-serif;
      font-size: 0.88rem;
      padding: 10px 12px;
      resize: none;
      height: 64px;
      outline: none;
    }
    .notes-textarea::placeholder { color: rgba(255,255,255,0.3); }
    .notes-textarea:focus { border-color: rgba(108,99,255,0.7); }
    .notes-add-btn {
      flex-shrink: 0;
      height: 36px;
      padding: 0 16px;
      border-radius: 8px;
      border: none;
      background: #6c63ff;
      color: #fff;
      font-family: "Manrope", sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .notes-add-btn:hover { opacity: 0.85; }
    .notes-page-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
    }

    .reader-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      gap: 12px;
      position: relative;
    }

    .pdf-page-container {
      position: relative;
      margin: 0 auto;
    }

    .pdf-page-container canvas {
      display: block;
      max-width: 100%;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }
    
    .textLayer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      opacity: 0.2;
      line-height: 1.0;
    }
    .textLayer span {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
    }
    
    .persistent-highlight {
      position: absolute;
      background: rgba(255, 226, 68, 0.4);
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 5;
    }

    /* Loading state */
    .reader-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: rgba(255,255,255,0.6);
    }
    .reader-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error state */
    .reader-error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      padding: 24px;
      text-align: center;
      color: rgba(255,255,255,0.6);
    }
    .reader-error a {
      display: inline-block;
      padding: 12px 28px;
      background: #6c63ff;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .reader-error a:hover { opacity: 0.9; }

    @media (max-width: 480px) {
      .reader-header { padding: 10px 14px; gap: 8px; }
      .reader-author { display: none; }
      .reader-body { padding: 10px 0; }
    }

    /* Auto-save toast */
    .reader-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(108, 99, 255, 0.92);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    .reader-toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="reader-header">
    <a class="reader-back" href="/books/" title="Back to Books">&#8592;</a>
    <span class="reader-title">{{ book.title }}</span>
    <span class="reader-author">{{ book.author }}</span>
    <div class="reader-controls">
      <button id="prev-btn" title="Previous page" disabled>&#9664;</button>
      <span class="reader-page-info" id="page-info">...</span>
      <button id="next-btn" title="Next page" disabled>&#9654;</button>
      <button id="bookmark-btn" class="btn-bookmark" title="Set bookmark — saves your progress" disabled>
        &#128278; Bookmark
      </button>
      <button id="notes-btn" class="btn-notes" title="Reading notes" disabled>
        &#128221; Notes
      </button>
    </div>
  </div>

  <!-- Notes panel -->
  <div class="notes-panel" id="notes-panel">
    <div class="notes-panel-header">
      <h3>&#128221; Notes — {{ book.title|truncatechars:30 }}</h3>
      <button class="notes-panel-close" id="notes-close" type="button">&#10005;</button>
    </div>
    <div class="notes-list" id="notes-list">
      <div class="notes-empty">No notes yet.</div>
    </div>
    <div class="notes-compose">
      <div class="notes-page-label" id="notes-page-label">Note for page 1</div>
      <div class="notes-compose-row">
        <textarea class="notes-textarea" id="notes-textarea" placeholder="Type your note here..."></textarea>
        <button class="notes-add-btn" id="notes-add-btn" type="button">Add</button>
      </div>
    </div>
  </div>

  <div class="reader-body" id="reader-body">
    <div class="reader-loading" id="reader-loading">
      <div class="spinner"></div>
      <span>Loading PDF...</span>
    </div>
  </div>

  <div class="reader-toast" id="reader-toast">Progress saved</div>

  <div class="reader-error" id="reader-error">
    <p>Could not load the PDF in the browser.</p>
    <a href="{{ book.file.url }}" target="_blank" rel="noopener">Download PDF instead</a>
  </div>

  <script type="module">
    const PDF_URL      = "{{ book.file.url }}";
    const WORKER_URL   = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.mjs";
    const BOOK_ID      = {{ book.id }};
    const INITIAL_PAGE = {{ start_page|default:0 }};

    const container   = document.getElementById("reader-body");
    const loading     = document.getElementById("reader-loading");
    const errorEl     = document.getElementById("reader-error");
    const prevBtn     = document.getElementById("prev-btn");
    const nextBtn     = document.getElementById("next-btn");
    const pageInfo    = document.getElementById("page-info");
    const toast       = document.getElementById("reader-toast");
    const bookmarkBtn = document.getElementById("bookmark-btn");
    const notesBtn    = document.getElementById("notes-btn");
    const notesPanel  = document.getElementById("notes-panel");
    const notesClose  = document.getElementById("notes-close");
    const notesList   = document.getElementById("notes-list");
    const notesInput  = document.getElementById("notes-textarea");
    const notesAddBtn = document.getElementById("notes-add-btn");
    const notesPageLabel = document.getElementById("notes-page-label");

    let pdfDoc      = null;
    let currentPage = 1;
    let rendering   = false;

    // Bookmark / session tracking
    // trackStartPage = the page the user was on when they last bookmarked (or opened)
    // sessionStart   = the time they opened the reader (or last bookmarked)
    let trackStartPage = 0;
    let sessionStart   = Date.now();

    // JWT token is stored in localStorage by the main app JS
    function getAuthToken() {
      return localStorage.getItem("bud_access") || "";
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    // Called when the user taps the Bookmark button.
    // Logs a reading session from the last bookmark page to the current page,
    // with duration = time since the reader was opened / last bookmarked.
    async function saveBookmark() {
      const endPage = currentPage;

      if (endPage === trackStartPage) {
        showToast("Turn some pages first!");
        return;
      }

      const token = getAuthToken();
      if (!token) {
        showToast("Not logged in — please log in again");
        return;
      }

      const minutes = Math.max(1, Math.round((Date.now() - sessionStart) / 60000));

      bookmarkBtn.disabled = true;
      bookmarkBtn.innerHTML = "Saving...";

      try {
        const resp = await fetch("/api/reading/progress/log-session/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`,
          },
          body: JSON.stringify({
            book_id: BOOK_ID,
            start_page: trackStartPage,
            end_page: endPage,
            duration_minutes: minutes,
          }),
        });

        if (resp.ok) {
          const session = await resp.json();
          trackStartPage = endPage;
          sessionStart   = Date.now();
          showToast(`\uD83D\uDD16 Bookmarked \u00B7 +${session.xp_earned} XP`);
        } else {
          const err = await resp.json().catch(() => ({}));
          showToast(err.detail || "Could not save — try again");
        }
      } catch (_) {
        showToast("Could not save — check your connection");
      } finally {
        bookmarkBtn.disabled = false;
        bookmarkBtn.innerHTML = "\uD83D\uDD16 Bookmark";
      }
    }

    bookmarkBtn.addEventListener("click", saveBookmark);

    // --------------------------------------------------------
    // API NOTES
    // --------------------------------------------------------
    async function loadNotesAPI() {
      const token = getAuthToken();
      if (!token) return [];
      try {
        const r = await fetch(`/api/reading/notes/?book_id=${BOOK_ID}`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        if (r.ok) return await r.json();
      } catch (e) { console.warn(e); }
      return [];
    }
    
    async function saveNoteAPI(text, pageNum, rects = null, color = "#ffe244", comment = "") {
      const token = getAuthToken();
      if (!token) return;
      try {
        await fetch(`/api/reading/notes/`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ book: BOOK_ID, page: pageNum, text: text, highlight_rects: rects, color: color, comment: comment })
        });
      } catch (e) { console.warn(e); }
    }
    
    async function deleteNoteAPI(id) {
      const token = getAuthToken();
      if (!token) return;
      try {
        await fetch(`/api/reading/notes/${id}/`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${token}` }
        });
      } catch (e) { console.warn(e); }
    }

    function noteEscape(str) {
      const d = document.createElement("div");
      d.textContent = str || "";
      return d.innerHTML;
    }

    async function renderNotes() {
      const notes = await loadNotesAPI();
      if (!notes.length) {
        notesList.innerHTML = '<div class="notes-empty">No notes yet. Add one below.</div>';
        return;
      }
      notesList.innerHTML = notes.map((n, i) => {
        const textHtml = n.text ? `<span class="note-text" style="display:block; margin-bottom:4px; opacity:0.85;">${noteEscape(n.text)}</span>` : '';
        const commentHtml = n.comment ? `<span class="note-text" style="display:block; font-weight:600; color:#fff;">${noteEscape(n.comment)}</span>` : '';
        return `
        <div class="note-item" style="flex-direction:column; align-items:stretch; position:relative;">
          <div style="display:flex; justify-content:space-between;">
            <span class="note-page">p.${n.page}</span>
            <button class="note-delete" data-id="${n.id}" title="Delete note">&#10005;</button>
          </div>
          <div style="margin-top:6px;">
            ${textHtml}
            ${commentHtml}
          </div>
        </div>
        `;
      }).join("");

      notesList.querySelectorAll(".note-delete").forEach((btn) => {
        btn.addEventListener("click", async () => {
          await deleteNoteAPI(btn.dataset.id);
          renderNotes();
        });
      });
    }

    notesBtn.addEventListener("click", () => {
      const open = notesPanel.classList.toggle("is-open");
      notesBtn.classList.toggle("is-open", open);
      if (open) {
        renderNotes();
        notesInput.focus();
      }
    });

    notesClose.addEventListener("click", () => {
      notesPanel.classList.remove("is-open");
      notesBtn.classList.remove("is-open");
    });

    notesAddBtn.addEventListener("click", async () => {
      const notesInputValue = notesInput.value.trim();
      if (!notesInputValue) return;
      notesAddBtn.disabled = true;
      await saveNoteAPI("", currentPage, null, "#ffe244", notesInputValue);
      notesInput.value = "";
      renderNotes();
      showToast("Note added");
      notesAddBtn.disabled = false;
    });

    // Allow Ctrl+Enter to save note
    notesInput.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") notesAddBtn.click();
    });

    // --- PDF rendering ---
    async function init() {
      try {
        let serverInitialPage = INITIAL_PAGE;
        const token = getAuthToken();
        if (token) {
          try {
            const progRes = await fetch(`/api/reading/progress/book-progress/?book_id=${BOOK_ID}`, {
              headers: { "Authorization": `Bearer ${token}` }
            });
            if (progRes.ok) {
              const progData = await progRes.json();
              if (progData.current_page > 0) {
                serverInitialPage = progData.current_page;
              }
            }
          } catch (e) {
            console.warn("Could not fetch progress", e);
          }
        }

        const pdfjsLib = await import("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.mjs");
        pdfjsLib.GlobalWorkerOptions.workerSrc = WORKER_URL;

        pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
        loading.style.display = "none";

        // Jump to where the user left off
        const resumePage = Math.max(1, Math.min(serverInitialPage || 1, pdfDoc.numPages));
        currentPage    = resumePage;
        trackStartPage = resumePage;  // bookmark session starts here
        sessionStart   = Date.now();  // timer starts now

        prevBtn.disabled = false;
        nextBtn.disabled = false;
        bookmarkBtn.disabled = false;
        notesBtn.disabled = false;
        notesPageLabel.textContent = `Note for page ${currentPage}`;

        updatePageInfo();
        renderPage(currentPage);

        if (serverInitialPage > 1) {
          showToast(`Resumed at page ${serverInitialPage}`);
        }
      } catch (err) {
        console.error("PDF load error:", err);
        loading.style.display = "none";
        container.style.display = "none";
        errorEl.style.display = "flex";
      }
    }

    function updatePageInfo() {
      pageInfo.textContent = `${currentPage} / ${pdfDoc.numPages}`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= pdfDoc.numPages;
    }

    async function renderPage(num) {
      if (rendering) return;
      rendering = true;

      const page = await pdfDoc.getPage(num);

      const containerWidth = container.clientWidth - 40;
      const unscaledViewport = page.getViewport({ scale: 1 });
      const scale = Math.min(containerWidth / unscaledViewport.width, 2.0);
      const viewport = page.getViewport({ scale });

      let pageContainer = document.getElementById("pdf-page-container");
      if (!pageContainer) {
        pageContainer = document.createElement("div");
        pageContainer.id = "pdf-page-container";
        pageContainer.className = "pdf-page-container";
        
        const canvas = document.createElement("canvas");
        canvas.id = "pdf-canvas";
        pageContainer.appendChild(canvas);
        
        const textLayerDiv = document.createElement("div");
        textLayerDiv.className = "textLayer";
        textLayerDiv.id = "pdf-text-layer";
        pageContainer.appendChild(textLayerDiv);
        
        container.appendChild(pageContainer);
      }
      
      pageContainer.style.width = viewport.width + "px";
      pageContainer.style.height = viewport.height + "px";

      const canvas = document.getElementById("pdf-canvas");
      const ctx = canvas.getContext("2d");
      canvas.height = viewport.height;
      canvas.width  = viewport.width;

      const textLayerDiv = document.getElementById("pdf-text-layer");
      textLayerDiv.innerHTML = "";
      textLayerDiv.style.setProperty('--scale-factor', scale);
      
      // Clear any old highlights
      pageContainer.querySelectorAll('.persistent-highlight').forEach(el => el.remove());

      await page.render({ canvasContext: ctx, viewport }).promise;
      
      try {
        const textContent = await page.getTextContent();
        pdfjsLib.renderTextLayer({
          textContentSource: textContent,
          container: textLayerDiv,
          viewport: viewport,
          textDivs: [],
        });
      } catch (err) {
        console.warn("Text layer could not be rendered", err);
      }
      
      loadNotesAPI().then(notes => {
         const pageNotes = notes.filter(n => n.page === num);
         pageNotes.forEach(n => {
            if (n.highlight_rects) drawHighlightRects(n.highlight_rects, n.color);
         });
      });

      rendering = false;
    }

    // Pass RGB so mix-blend-mode looks correct (hex to rgba)
    function hexToRgba(hex, alpha) {
       const h = hex.replace('#', '');
       if(h.length === 6){
          const r = parseInt(h.substring(0,2), 16),
                g = parseInt(h.substring(2,4), 16),
                b = parseInt(h.substring(4,6), 16);
          return `rgba(${r}, ${g}, ${b}, ${alpha})`;
       }
       return `rgba(255, 226, 68, ${alpha})`;
    }

    function drawHighlightRects(rects, colorHex = "#ffe244") {
      const cont = document.getElementById("pdf-page-container");
      if (!cont || !rects) return;
      const rgbaColor = hexToRgba(colorHex, 0.45);
      rects.forEach(r => {
         const div = document.createElement("div");
         div.className = "persistent-highlight";
         div.style.background = rgbaColor;
         div.style.left = (r.left * 100) + "%";
         div.style.top = (r.top * 100) + "%";
         div.style.width = (r.width * 100) + "%";
         div.style.height = (r.height * 100) + "%";
         cont.appendChild(div);
      });
    }

    function onPageChange() {
      updatePageInfo();
      notesPageLabel.textContent = `Note for page ${currentPage}`;
    }

    prevBtn.addEventListener("click", () => {
      if (currentPage <= 1) return;
      currentPage--;
      onPageChange();
      renderPage(currentPage);
      container.scrollTop = 0;
    });

    nextBtn.addEventListener("click", () => {
      if (currentPage >= pdfDoc.numPages) return;
      currentPage++;
      onPageChange();
      renderPage(currentPage);
      container.scrollTop = 0;
    });

    document.addEventListener("keydown", (e) => {
      // Don't hijack keys when user is typing in the notes textarea
      if (e.target === notesInput) return;
      if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   prevBtn.click();
      if (e.key === "ArrowRight" || e.key === "ArrowDown")  nextBtn.click();
      if (e.key === "b" || e.key === "B")                   bookmarkBtn.click();
      if (e.key === "n" || e.key === "N")                   notesBtn.click();
    });

    // Floating highlight popover logic
    const hlPopover = document.createElement("div");
    hlPopover.id = "highlight-popover";
    hlPopover.style.cssText = "position:absolute; display:none; z-index:200; background:#29293d; border-radius:12px; padding:12px; box-shadow:0 8px 24px rgba(0,0,0,0.5); width:280px; flex-direction:column; gap:10px;";
    hlPopover.innerHTML = `
       <div style="display:flex; gap:10px; margin-bottom:4px;" id="hl-colors">
         <button class="hl-color-btn active" data-color="#ffe244" style="background:#ffe244; width:22px; height:22px; border-radius:50%; border:2px solid #fff; cursor:pointer;"></button>
         <button class="hl-color-btn" data-color="#ffb3ba" style="background:#ffb3ba; width:22px; height:22px; border-radius:50%; border:2px solid transparent; cursor:pointer;"></button>
         <button class="hl-color-btn" data-color="#baffc9" style="background:#baffc9; width:22px; height:22px; border-radius:50%; border:2px solid transparent; cursor:pointer;"></button>
         <button class="hl-color-btn" data-color="#bae1ff" style="background:#bae1ff; width:22px; height:22px; border-radius:50%; border:2px solid transparent; cursor:pointer;"></button>
       </div>
       <textarea id="hl-comment" placeholder="Add an annotation (optional)..." style="width:100%; height:60px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:8px; color:#fff; font-family:inherit; font-size:0.85rem; resize:none;"></textarea>
       <div style="display:flex; justify-content:flex-end;">
         <button id="hl-save-btn" style="background:#6c63ff; color:#fff; border:none; border-radius:6px; padding:6px 14px; font-weight:700; cursor:pointer; font-size:0.85rem;">Save Highlight</button>
       </div>
    `;
    document.body.appendChild(hlPopover);

    let activeHlColor = "#ffe244";
    let pendingNote = {
       text: "",
       rects: [],
       contRect: null
    };
    
    const colorBtns = hlPopover.querySelectorAll(".hl-color-btn");
    colorBtns.forEach(btn => {
      btn.addEventListener("mousedown", (e) => {
         e.preventDefault(); // keep text selection
         e.stopPropagation();
         colorBtns.forEach(b => b.style.borderColor = "transparent");
         btn.style.borderColor = "#fff";
         activeHlColor = btn.dataset.color;
      });
    });

    const hlCommentInput = document.getElementById("hl-comment");
    const hlSaveBtn = document.getElementById("hl-save-btn");

    hlCommentInput.addEventListener("keydown", (e) => e.stopPropagation());

    document.addEventListener("mouseup", (e) => {
       if (e.target.closest("#highlight-popover") || e.target.closest("#notes-panel")) return;
       const selection = window.getSelection();
       setTimeout(() => {
         if (selection && !selection.isCollapsed && selection.toString().trim().length > 0) {
           pendingNote.text = selection.toString().trim();
           const range = selection.getRangeAt(0);
           pendingNote.rects = Array.from(range.getClientRects());
           pendingNote.contRect = document.getElementById("pdf-page-container").getBoundingClientRect();
           
           const rect = range.getBoundingClientRect();
           hlPopover.style.top = (rect.bottom + 10) + "px"; 
           hlPopover.style.left = Math.max(10, (rect.left + rect.width / 2 - 140)) + "px";
           hlPopover.style.display = "flex";
         } else {
           hlPopover.style.display = "none";
           pendingNote.text = "";
         }
       }, 50);
    });

    document.addEventListener("mousedown", (e) => {
       if (!e.target.closest("#highlight-popover") && hlPopover.style.display !== "none") {
          // let mouseup handle hiding if they clicked outside
       }
    });

    hlSaveBtn.addEventListener("mousedown", async (e) => {
       e.preventDefault(); 
       if (!pendingNote.text) return;
       
       const commentText = hlCommentInput.value.trim();
       
       const contRect = pendingNote.contRect;
       const rects = pendingNote.rects.map(rect => ({
          left: (rect.left - contRect.left) / contRect.width,
          top: (rect.top - contRect.top) / contRect.height,
          width: rect.width / contRect.width,
          height: rect.height / contRect.height
       }));

       hlSaveBtn.innerHTML = "Saving...";
       hlSaveBtn.disabled = true;
       hlSaveBtn.style.opacity = "0.7";
       
       await saveNoteAPI(pendingNote.text, currentPage, rects, activeHlColor, commentText);
       
       showToast("Highlight saved!");
       window.getSelection().removeAllRanges();
       hlPopover.style.display = "none";
       hlSaveBtn.innerHTML = "Save Highlight";
       hlSaveBtn.disabled = false;
       hlSaveBtn.style.opacity = "1";
       hlCommentInput.value = "";
       
       drawHighlightRects(rects, activeHlColor);
       
       if (notesPanel.classList.contains("is-open")) {
         renderNotes();
       }
    });

    init();
  </script>
</body>
</html>
